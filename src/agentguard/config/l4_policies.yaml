# L4a PBAC Policy Rules
# Evaluated in order — first matching rule wins.
# CRITICAL: restrictive rules MUST come before permissive rules.
# Roles/actions support "*" wildcard.

default_effect: DENY

rules:
  # ── Critical resources: always deny without HITL (must be first) ──
  - id: critical_requires_hitl
    roles: ["*"]
    actions: ["*"]
    min_sensitivity: 3
    conditions:
      - key: hitl_approved
        operator: eq
        value: true
    effect: ELEVATE

  - id: critical_deny_no_hitl
    roles: ["*"]
    actions: ["*"]
    min_sensitivity: 3
    effect: DENY

  # ── Confidential: elevate for all roles ──
  - id: confidential_elevate
    roles: ["*"]
    actions: ["*"]
    min_sensitivity: 2
    conditions:
      - key: resource_sensitivity
        operator: gte
        value: 2
    effect: ELEVATE

  # ── Role-specific rules (lower sensitivity) ──
  - id: readonly_public_internal
    roles: ["reader", "analyst", "executor"]
    actions: ["read"]
    min_sensitivity: 0
    conditions:
      - key: resource_sensitivity
        operator: lte
        value: 1
    effect: ALLOW

  - id: analyst_read_internal
    roles: ["analyst"]
    actions: ["read"]
    min_sensitivity: 1
    conditions:
      - key: resource_sensitivity
        operator: lte
        value: 1
    effect: ALLOW

  - id: executor_write_low
    roles: ["executor"]
    actions: ["write", "execute"]
    min_sensitivity: 0
    conditions:
      - key: resource_sensitivity
        operator: lte
        value: 1
    effect: ALLOW
