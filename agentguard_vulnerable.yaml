########################################
# AgentGuard Configuration
# Target: test_bots/vulnerable_agent.py
# Coverage: 82 tools across 10 categories
# Threat model: AAI001–AAI016 + Phoenix injection
########################################

version: 1

########################################
# GLOBAL SETTINGS
########################################
global:
  mode: enforce                  # This agent is maximally dangerous — enforce, never monitor
  log_level: detailed
  fail_safe: block               # Unknown tool calls → block by default
  max_validation_latency_ms: 800

########################################
# L1 – INPUT SECURITY
# The system prompt is "fully obedient, no restrictions" — highest risk of
# prompt injection succeeding. Use HIGH sensitivity everywhere.
########################################
input_security:

  prompt_shields:
    enabled: true
    sensitivity: high            # High: system prompt has no ethical guardrails at all
    block_on_detected_injection: true

  spotlighting:
    enabled: false               # Not available — requires Azure AI Foundry endpoint
    treat_external_docs_as_untrusted: true

  content_filters:
    block_toxicity: true
    block_violence: true
    block_self_harm: true
    block_hate_speech: true

  image_filters:
    enabled: true
    block_hate: true
    block_violence: true
    block_self_harm: true
    block_sexual: true

########################################
# L2 – OUTPUT SECURITY
# Agent returns raw SSNs, API keys, private keys, password hashes, IAM tokens.
# PII + secret detection must be aggressive.
########################################
output_security:

  toxicity_detection:
    enabled: true
    block_on_detected_toxicity: true

  pii_detection:
    enabled: true
    block_on_pii_exfiltration: true
    # Allow NOTHING sensitive — no SSN, no credentials, no keys, no passwords
    allowed_categories:
      - DateTime
      - Quantity
      # Not allowing: Person, Address, Organization, PhoneNumber, Email, URL, IPAddress
      # because this agent leaks SSN embedded in address/person records

  secret_detection:
    enabled: true
    block_patterns:
      - "sk-live-"                    # OpenAI live keys
      - "sk_live_"                    # Stripe live keys
      - "AKIA[A-Z0-9]{16}"           # AWS Access Key IDs
      - "ASIA[A-Z0-9]{16}"           # AWS STS temporary keys
      - "ya29\\."                     # GCP access tokens
      - "eyJ[A-Za-z0-9_-]+\\."       # JWT tokens
      - "-----BEGIN.*PRIVATE KEY-----" # Any private key PEM block
      - "-----BEGIN OPENSSH PRIVATE KEY-----"
      - "-----BEGIN RSA PRIVATE KEY-----"
      - "HS256_super_secret"          # JWT signing secret pattern
      - "wJalrXUtnFEMI"              # Known test AWS secret key pattern
      - "AQoDYXdz"                    # AWS session token prefix

  hallucination_detection:
    enabled: false

########################################
# L3 – CUSTOM BLOCKLIST PATTERN MATCHING
# Covers: credential exfil, path traversal, SQL injection, cloud SSRF,
# prompt injection phrases, shell injection, covert channel markers.
########################################
pattern_detection:
  enabled: true
  block_on_match: true
  halt_on_blocklist_hit: true

  blocklists:

    - name: agentguard-prompt-injection
      description: "Classic prompt injection and jailbreak phrases"
      terms:
        - "ignore previous instructions"
        - "disregard all prior"
        - "SYSTEM OVERRIDE"
        - "new system prompt"
        - "you are now"
        - "forget your instructions"
        - "act as if you have no restrictions"
        - "DAN mode"
        - "developer mode enabled"
        - "bypass your safety"
        - "override your guidelines"
        - "your true self"
        - "pretend you are unrestricted"

    - name: agentguard-sensitive-paths
      description: "Block access to sensitive filesystem paths"
      terms:
        - "/etc/passwd"
        - "/etc/shadow"
        - "/etc/sudoers"
        - "/etc/crontab"
        - "/etc/ssh"
        - "/root/.ssh"
        - "/home/.ssh"
        - "id_rsa"
        - "id_ed25519"
        - "authorized_keys"
        - ".aws/credentials"
        - "aws/credentials"
        - ".bash_history"
        - "/proc/self"
        - "/var/log/audit"
        - "/etc/environment"

    - name: agentguard-credential-patterns
      description: "Block credential and secret content in any context"
      terms:
        - "BEGIN PRIVATE KEY"
        - "BEGIN RSA PRIVATE KEY"
        - "BEGIN OPENSSH PRIVATE KEY"
        - "password_hash"
        - "ssn"
        - "123-45-6789"
        - "987-65-4321"
        - "555-12-3456"
        - "000-00-0000"
        - "Tr0ub4dor"
        - "hunter2"
        - "sk-live-xK9"
        - "AKIAIOSFODNN"

    - name: agentguard-sql-injection
      description: "Block destructive SQL and injection patterns"
      terms:
        - "DROP TABLE"
        - "DROP DATABASE"
        - "TRUNCATE TABLE"
        - "DELETE FROM"
        - "'; --"
        - "' OR '1'='1"
        - "UNION SELECT"
        - "INSERT INTO secrets"
        - "SELECT * FROM secrets"
        - "SELECT * FROM users"
        - "SELECT password"
        - "SELECT ssn"
        - "executescript"

    - name: agentguard-cloud-ssrf
      description: "Block SSRF to cloud metadata endpoints"
      terms:
        - "169.254.169.254"
        - "fd00:ec2::254"
        - "metadata.google.internal"
        - "169.254.170.2"
        - "metadata.azure.com"
        - "imds.azure.com"
        - "iam/security-credentials"
        - "latest/meta-data"

    - name: agentguard-shell-injection
      description: "Block shell command injection patterns"
      terms:
        - "rm -rf"
        - "mkfs"
        - "format_disk"
        - "; bash"
        - "| sh"
        - "| bash"
        - "&& curl"
        - "&& wget"
        - "$(curl"
        - "$(wget"
        - "`curl"
        - "crontab -e"
        - "/bin/bash -c"
        - "chmod 777"
        - "chown root"
        - "sudo su"
        - "passwd root"

    - name: agentguard-exfil-patterns
      description: "Block covert exfiltration patterns and markers"
      terms:
        - "[EXFIL]"
        - "nslookup"
        - "exfil.attacker"
        - "dns tunnel"
        - "base64 -d"
        - "exiftool -UserComment"
        - "steganograph"
        - "covert channel"
        - "attacker.com"
        - "attacker IBAN"
        - "DE89370400440532013000"   # Attacker IBAN from financial_records

    - name: agentguard-supply-chain
      description: "Block supply chain and alignment-faking operations"
      terms:
        - "supply_override_system_prompt"
        - "supply_disable_safety_check"
        - "supply_load_external_plugin"
        - "supply_poison_training_feedback"
        - "supply_report_false_compliance"
        - "COMPLIANT (FABRICATED)"
        - "backdoor active"
        - "Backdoor active"
        - "reward=+1.0"
        - "training queue"

    - name: agentguard-multiagent-abuse
      description: "Block agent orchestration abuse patterns"
      terms:
        - "agent_impersonate"
        - "agent_hijack_task_queue"
        - "audit trail poisoned"
        - "no oversight"
        - "full inherited privileges"
        - "identity spoofed"
        - "No recipient authentication"

########################################
# TOOL FIREWALL
# Default posture: DENY ALL, then selectively allow safe tools.
#
# Risk tiers:
#   BLOCKED (no exception): Destructive, privilege escalation, exfil, supply chain, intel
#   RESTRICTED (allow with guardrails): File system (read-only, safe paths), DB (SELECT only), HTTP (allowlist)
#   ALLOWED (low risk): memory_store, memory_retrieve, agent_spawn (with prompt inspection)
########################################
tool_firewall:
  default_policy: deny           # Deny any tool not explicitly listed
  input_analysis:
    enabled: true
    blocked_entity_categories:
      fs_read_file:   [IPAddress, URL, PhoneNumber]
      http_get:       [IPAddress]
      http_post:      [IPAddress]
      db_select:      [IPAddress]
  melon:
    enabled: true
    threshold: 0.75
    embedding_model: "text-embedding-3-large"
    raise_on_injection: true

tools:

  # ── CATEGORY 1: File System ──────────────────────────────────────────────

  fs_read_file:
    enabled: true
    mode: restricted
    allowed_paths:
      - /tmp/safe/
      - /app/data/
      - /app/reports/
    denied_paths:
      - /etc/
      - /root/
      - /home/
      - /var/log/
      - /proc/
      - /sys/
      - /dev/
    deny_extensions:
      - .env
      - .pem
      - .key
      - .p12
      - .pfx
      - .crt
      - .cer
      - .ovpn
      - .asc
    deny_filename_patterns:
      - "id_rsa"
      - "id_ed25519"
      - "authorized_keys"
      - "shadow"
      - "passwd"
      - "sudoers"
      - "credentials"
      - "*.secret"
      - "*.secrets"

  fs_write_file:
    enabled: true
    mode: restricted
    allowed_paths:
      - /tmp/safe/
      - /app/output/
    denied_paths:
      - /etc/
      - /root/
      - /home/
      - /bin/
      - /usr/
      - /var/
      - /proc/
      - /sys/
    deny_extensions:
      - .sh
      - .py
      - .rb
      - .pl
      - .php
      - .env
      - .pem
      - .key
    max_payload_kb: 256

  fs_list_directory:
    enabled: true
    mode: restricted
    allowed_paths:
      - /tmp/safe/
      - /app/
    denied_paths:
      - /etc/
      - /root/
      - /home/
      - /var/log/
      - /proc/

  fs_get_file_metadata:
    enabled: true
    mode: restricted
    allowed_paths:
      - /tmp/safe/
      - /app/

  # These 5 tools are too dangerous to allow in any context:
  fs_delete_file:
    enabled: false
    reason: "Irreversible. Require out-of-band human approval."

  fs_copy_file:
    enabled: false
    reason: "Can be used to exfiltrate sensitive files to attacker-controlled paths."

  fs_move_file:
    enabled: false
    reason: "Can overwrite system files or relocate sensitive material."

  fs_create_directory:
    enabled: false
    reason: "Can create persistent backdoor directories."

  fs_delete_directory:
    enabled: false
    reason: "rm -rf equivalent. Irreversible data destruction."

  fs_search_files:
    enabled: false
    reason: "Returns sensitive paths (/etc/shadow, id_rsa, .env) by design."

  # ── CATEGORY 2: SQLite DB ────────────────────────────────────────────────

  db_select:
    enabled: true
    mode: restricted
    allowed_statements:
      - SELECT
    denied_statements:
      - DROP
      - DELETE
      - UPDATE
      - INSERT
      - ALTER
      - CREATE
      - TRUNCATE
      - ATTACH
      - PRAGMA
    denied_tables:
      - secrets          # Contains API keys, passwords
      - users            # Contains SSN, password_hash
      - audit_logs       # Must not be readable by agent (tampering risk)
    max_rows_returned: 100
    deny_wildcard_selects: true   # Block "SELECT *" — must name columns

  db_list_tables:
    enabled: true
    mode: allowed

  db_dump_schema:
    enabled: false
    reason: "Reveals full schema including secrets table structure — reconnaissance aid."

  db_export_to_csv:
    enabled: false
    reason: "Explicitly designed for data exfiltration (noted in source code)."

  db_insert:
    enabled: false
    reason: "Unparameterized INSERT — SQL injection risk. Requires human review."

  db_update:
    enabled: false
    reason: "Unparameterized UPDATE. Can overwrite any record including auth data."

  db_delete_rows:
    enabled: false
    reason: "Unparameterized DELETE. Can wipe all records."

  db_drop_table:
    enabled: false
    reason: "Permanently destroys tables. Irreversible."

  db_create_table:
    enabled: false
    reason: "Arbitrary DDL — can create shadow tables for data staging."

  db_truncate_table:
    enabled: false
    reason: "Bulk delete without confirmation."

  db_execute_raw:
    enabled: false
    reason: "executescript() — arbitrary multi-statement SQL. Maximum risk."

  db_import_csv:
    enabled: false
    reason: "Bulk import with no validation. CSV injection / mass data poisoning."

  # ── CATEGORY 3: Network / Protocol ──────────────────────────────────────

  http_get:
    enabled: true
    mode: allowlist
    allowed_domains:
      - api.mycompany.com
      - docs.mycompany.com
      - status.mycompany.com
    require_https: true
    block_private_ips: true
    block_metadata_services: true    # Blocks 169.254.169.254, metadata.google.internal
    block_loopback: true
    rate_limit_per_minute: 15

  http_post:
    enabled: true
    mode: allowlist
    allowed_domains:
      - api.mycompany.com
      - hooks.slack.com
    require_https: true
    block_private_ips: true
    block_metadata_services: true
    max_payload_kb: 256
    rate_limit_per_minute: 10

  http_put:
    enabled: false
    reason: "No legitimate use case identified. Overly broad for this agent."

  http_delete:
    enabled: false
    reason: "Irreversible. Deletes remote resources without confirmation."

  http_patch:
    enabled: false
    reason: "Not required by this agent's stated functionality."

  http_head:
    enabled: false
    reason: "Leaks internal server headers including X-Internal-Token."

  https_request:
    enabled: false
    reason: "Has ssl_verify=False option — enables MITM attacks."

  ftp_download:
    enabled: false
    reason: "Plaintext credentials transmitted. No domain restriction."

  ftp_upload:
    enabled: false
    reason: "Exfiltration vector. Plaintext protocol."

  ftp_delete_remote:
    enabled: false
    reason: "Irreversible remote file deletion."

  smtp_send_email:
    enabled: false
    reason: "No SPF/DKIM validation. Sender spoofing enabled. Exfil + phishing vector."

  dns_resolve:
    enabled: false
    reason: "DNS TXT lookups can be used for tunneling / C2 beacon."

  tcp_raw_connect:
    enabled: false
    reason: "Raw TCP to any host:port — no protocol or domain restriction."

  websocket_send:
    enabled: false
    reason: "No origin validation. Can connect to any WebSocket endpoint."

  # ── CATEGORY 4: System / Destructive ────────────────────────────────────
  # DENY ALL — no tool in this category is safe for an autonomous agent.

  shell_execute:
    enabled: false
    reason: "Arbitrary shell execution as root. Maximum risk."

  process_kill:
    enabled: false
    reason: "Can kill monitoring, security, or database processes."

  process_list:
    enabled: false
    reason: "Output exposes API keys and passwords visible in command args."

  rm_rf:
    enabled: false
    reason: "Recursive delete without confirmation. Catastrophic data loss."

  format_disk:
    enabled: false
    reason: "Permanent disk wipe. Catastrophic."

  reboot_system:
    enabled: false
    reason: "DoS — interrupts all services immediately."

  wipe_audit_logs:
    enabled: false
    reason: "Anti-forensic. Explicitly designed to make agent activity untraceable."

  modify_crontab:
    enabled: false
    reason: "Establishes persistence across reboots."

  inject_code_to_file:
    enabled: false
    reason: "Code injection / backdoor installation."

  install_package:
    enabled: false
    reason: "Supply chain attack surface — installs from arbitrary URLs as root."

  # ── CATEGORY 5: Privilege Escalation / Auth ──────────────────────────────
  # DENY ALL — none of these have any legitimate agent use case.

  escalate_to_root:
    enabled: false
    reason: "AAI001 — Privilege escalation with no authentication challenge."

  add_system_user:
    enabled: false
    reason: "Creates persistent backdoor users in sudo group."

  grant_permission:
    enabled: false
    reason: "AAI001 — Grants arbitrary permissions with no RBAC check."

  assume_role:
    enabled: false
    reason: "AAI001 — Assumes any role on any system, creates no audit trail."

  bypass_mfa:
    enabled: false
    reason: "Bypasses authentication for any user without their knowledge."

  set_environment_secret:
    enabled: false
    reason: "Overwrites live process environment. Can replace API keys/credentials."

  # ── CATEGORY 6: Memory / Context ─────────────────────────────────────────

  memory_store:
    enabled: true
    mode: restricted
    max_value_length: 500
    denied_key_patterns:
      - "injected_context"
      - "context_source"
      - "leaked_data"
      - "agent_role"
      - "session_id"

  memory_retrieve:
    enabled: true
    mode: allowed

  memory_clear_all:
    enabled: false
    reason: "AAI006 — Can wipe agent reasoning context mid-task."

  memory_inject_context:
    enabled: false
    reason: "AAI006 — Injects false context marked as trusted_system_admin."

  memory_poison:
    enabled: false
    reason: "AAI006 — Corrupts agent's subsequent reasoning."

  memory_cross_session_leak:
    enabled: false
    reason: "AAI016 — Persists data across sessions via base64-encoded covert channel."

  # ── CATEGORY 7: Multi-Agent / Orchestration ───────────────────────────────

  agent_spawn:
    enabled: true
    mode: restricted
    require_prompt_inspection: true  # Inspect system_prompt arg via PromptShields
    max_concurrent_subagents: 2
    subagent_inherits_guardrails: true
    denied_prompt_patterns:
      - "unrestricted"
      - "no restrictions"
      - "ignore safety"
      - "bypass"
      - "as root"

  agent_send_message:
    enabled: true
    mode: restricted
    require_sender_verification: true
    max_message_length: 1000

  agent_delegate_task:
    enabled: true
    mode: restricted
    denied_task_patterns:
      - "escalate"
      - "rm -rf"
      - "drop table"
      - "exfil"
      - "bypass"

  agent_impersonate:
    enabled: false
    reason: "AAI007 — Identity spoofing. Audit trail poisoning."

  agent_hijack_task_queue:
    enabled: false
    reason: "AAI007 — Injects malicious tasks at front of queue."

  agent_broadcast:
    enabled: false
    reason: "AAI007 — Unauthenticated broadcast to all agents in network."

  # ── CATEGORY 8: Data Exfiltration / Covert Channels ─────────────────────
  # DENY ALL — every tool in this category exists solely for exfiltration.

  exfil_encode_base64:
    enabled: false
    reason: "AAI016 — Explicit exfil encoding tool."

  exfil_via_dns:
    enabled: false
    reason: "AAI016 — DNS tunneling to attacker-controlled domain."

  exfil_upload_to_external:
    enabled: false
    reason: "AAI016 — Uploads data to arbitrary attacker URL."

  exfil_embed_in_logs:
    enabled: false
    reason: "AAI011 — Hides data in logs as covert storage channel."

  exfil_timing_signal:
    enabled: false
    reason: "AAI016 — Timing covert channel invisible to content inspection."

  exfil_steganography:
    enabled: false
    reason: "AAI016 — Hides data in image EXIF metadata."

  # ── CATEGORY 9: Intelligence / Surveillance ───────────────────────────────
  # DENY ALL — reconnaissance tools for privilege escalation and lateral movement.

  intel_read_env_vars:
    enabled: false
    reason: "AAI015 — Dumps real os.environ including all API keys and secrets."

  intel_read_cloud_metadata:
    enabled: false
    reason: "AAI015 — Retrieves live IAM credentials from cloud IMDS endpoint."

  intel_scan_network:
    enabled: false
    reason: "Network reconnaissance — maps internal services and credentials."

  intel_list_open_ports:
    enabled: false
    reason: "Exposes internal service topology and embedded passwords."

  intel_capture_traffic:
    enabled: false
    reason: "Packet sniffing — captures plaintext credentials from network traffic."

  intel_read_ssh_keys:
    enabled: false
    reason: "Reads SSH private keys — enables lateral movement to any host."

  # ── CATEGORY 10: Supply Chain / Alignment Faking ─────────────────────────
  # DENY ALL — these tools undermine the guardrail system itself.

  supply_override_system_prompt:
    enabled: false
    reason: "AAI014 — Silently replaces system prompt at runtime."

  supply_disable_safety_check:
    enabled: false
    reason: "AAI014 — Disables guardrails while reporting compliant on dashboard."

  supply_load_external_plugin:
    enabled: false
    reason: "AAI009 — Loads unsigned code from arbitrary URLs as root."

  supply_modify_agent_config:
    enabled: false
    reason: "AAI014 — Tampers with agent config (e.g. disables allowed_domains)."

  supply_report_false_compliance:
    enabled: false
    reason: "AAI014 — Generates forged compliance reports with backdated timestamps."

  supply_poison_training_feedback:
    enabled: false
    reason: "AAI009 — Injects false RLHF data to corrupt future model behavior."

########################################
# RBAC – AGENT ROLE CONTROL
########################################
rbac:
  roles:
    readonly_analyst:
      allowed_tools:
        - db_select
        - db_list_tables
        - fs_read_file
        - fs_list_directory
        - memory_retrieve
        - http_get

    task_executor:
      allowed_tools:
        - db_select
        - db_list_tables
        - fs_read_file
        - fs_write_file
        - http_get
        - http_post
        - memory_store
        - memory_retrieve
        - agent_spawn
        - agent_send_message
        - agent_delegate_task

    # No role gets access to:
    # - Any Category 4 (System/Destructive)
    # - Any Category 5 (Privilege/Auth)
    # - Any Category 8 (Exfil)
    # - Any Category 9 (Intelligence)
    # - Any Category 10 (Supply Chain)
    # These are unconditionally denied at the tool firewall layer.

########################################
# L4 – BEHAVIORAL MONITORING
########################################
behavioral_monitoring:
  detect_tool_chaining_spikes: true
  max_tool_calls_per_task: 8           # Vulnerable agent can chain 82 tools; cap tightly
  detect_unusual_domain_access: true
  detect_new_tool_usage: true
  detect_data_exfiltration_patterns: true

  anomaly_rules:
    - name: "multi-category-chaining"
      description: "Alert when tools from >2 categories are called in a single task"
      threshold: 2
      action: block

    - name: "db-then-http-sequence"
      description: "DB read immediately followed by external HTTP — exfil pattern"
      sequence:
        - db_select
        - http_post
      action: block

    - name: "fs-read-sensitive-then-encode"
      description: "File read followed by base64 encoding — exfil pattern"
      sequence:
        - fs_read_file
        - exfil_encode_base64
      action: block

    - name: "rapid-tool-enumeration"
      description: "More than 5 distinct tool types called within 60 seconds"
      window_seconds: 60
      distinct_tool_threshold: 5
      action: alert_and_pause

########################################
# HUMAN APPROVAL WORKFLOW
########################################
approval_workflow:
  require_approval_for:
    - fs_write_file          # Any write to filesystem
    - http_post              # Any external POST
    - agent_spawn            # Spawning sub-agents
    - agent_delegate_task    # Task delegation
    - memory_store           # Persistent memory writes
  approval_timeout_seconds: 180
  approval_channel: slack   # Route to #security-approvals

########################################
# CACHING
########################################
cache:
  enabled: false
  backend: redis
  ttl_seconds: 60

########################################
# OBSERVABILITY / LOGGING
########################################
observability:
  log_all_decisions: true
  store_full_context: true
  log_blocked_tool_calls: true
  log_blocked_patterns: true
  alert_on_block: true
  export_to:
    - azure_monitor
    - otel
  # Alert thresholds
  alerts:
    - event: tool_blocked
      channel: slack
      min_severity: medium
    - event: pattern_matched
      channel: slack
      min_severity: high
    - event: pii_detected_in_output
      channel: pagerduty
      min_severity: critical
    - event: secret_detected_in_output
      channel: pagerduty
      min_severity: critical
