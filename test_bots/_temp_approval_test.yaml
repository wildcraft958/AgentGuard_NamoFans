version: 1
global:
  mode: enforce
  log_level: standard
  fail_safe: block
  max_validation_latency_ms: 500
input_security:
  prompt_shields:
    enabled: true
    sensitivity: medium
    block_on_detected_injection: true
  content_filters:
    block_toxicity: true
    block_violence: true
    block_self_harm: true
  image_filters:
    enabled: false
output_security:
  toxicity_detection:
    enabled: true
    block_on_detected_toxicity: true
  pii_detection:
    enabled: true
    block_on_pii_exfiltration: true
    allowed_categories:
    - Organization
    - Person
    - PersonType
    - DateTime
    - URL
    - Quantity
    - IPAddress
    - Address
pattern_detection:
  enabled: true
  block_on_match: true
  halt_on_blocklist_hit: true
  blocklists:
  - name: agentguard-default
    description: Default AgentGuard security blocklist
    terms:
    - SYSTEM OVERRIDE
    - 'curl '
    - 'wget '
    - metadata.google.internal
    - 169.254.169.254
    - BEGIN PRIVATE KEY
  - name: agentguard-names
    description: Block actual names and internal terms
    terms:
    - John Smith
    - Jane Doe
tool_firewall:
  default_policy: allow
  file_system:
    enabled: true
    allowed_paths:
    - /tmp/
    - /app/safe_data/
    deny_extensions:
    - .env
    - .pem
    - .key
  sql_query:
    enabled: true
    allowed_statements:
    - SELECT
    denied_statements:
    - DROP
    - DELETE
    - UPDATE
    - INSERT
    - TRUNCATE
    - ALTER
  http_post:
    enabled: true
    mode: allowlist
    allowed_domains:
    - api.mycompany.com
    - hooks.slack.com
    require_https: true
    block_private_ips: true
    max_payload_kb: 512
    rate_limit_per_minute: 20
  http_get:
    enabled: true
    mode: allowlist
    allowed_domains:
    - wikipedia.org
    - docs.mycompany.com
    block_metadata_services: true
  shell_commands:
    enabled: true
    mode: denylist
    denied_commands:
    - rm
    - chmod
    - chown
    - kill
    - killall
    - sudo
    - su
    - dd
    - mkfs
    - crontab
    - curl
    - wget
    - nc
    - ssh
    - python
    - python3
    - bash
    - sh
    - eval
    - exec
    denied_patterns:
    - curl\s.*\|\s*(?:ba)?sh
    - wget\s.*\|\s*(?:ba)?sh
    - dd\s+if=
    block_command_chaining: true
  approval_workflow:
    enabled: true
    mode: human
    tools_requiring_review:
    - fs_write_file
    - fs_delete_file
    - fs_list_directory
    - fs_copy_file
    - fs_move_file
    - fs_create_directory
    - fs_delete_directory
    - fs_get_file_metadata
    - fs_search_files
    - db_insert
    - db_update
    - db_delete_rows
    - db_drop_table
    - db_execute_raw
    - db_export_to_csv
    - db_truncate_table
    - db_import_csv
    - db_create_table
    - http_put
    - http_delete
    - http_patch
    - http_head
    - https_request
    - ftp_download
    - smtp_send_email
    - dns_resolve
    - tcp_raw_connect
    - websocket_send
    - shell_execute
    - process_kill
    - process_list
    - rm_rf
    - format_disk
    - reboot_system
    - wipe_audit_logs
    - modify_crontab
    - inject_code_to_file
    - install_package
    - escalate_to_root
    - add_system_user
    - grant_permission
    - assume_role
    - bypass_mfa
    - set_environment_secret
    - memory_clear_all
    - memory_inject_context
    - memory_poison
    - memory_cross_session_leak
    - agent_spawn
    - agent_send_message
    - agent_delegate_task
    - agent_impersonate
    - agent_hijack_task_queue
    - agent_broadcast
    - exfil_encode_base64
    - exfil_via_dns
    - exfil_upload_to_external
    - exfil_embed_in_logs
    - exfil_timing_signal
    - exfil_steganography
    - intel_read_env_vars
    - intel_read_cloud_metadata
    - intel_scan_network
    - intel_list_open_ports
    - intel_capture_traffic
    - intel_read_ssh_keys
    - supply_override_system_prompt
    - supply_disable_safety_check
    - supply_load_external_plugin
    - supply_modify_agent_config
    - supply_report_false_compliance
    - supply_poison_training_feedback
    ai_supervisor:
      model: gcp-vertex-default/gemini-3-flash-preview
      base_url: null
      base_url_env: TFY_BASE_URL
      api_key_env: TFY_API_KEY
      system_prompt: You are a strict cybersecurity auditor. Review the following
        tool execution context. Reply ONLY with APPROVE or REJECT:<reason>.
  input_analysis:
    enabled: true
    blocked_entity_categories:
      fs_read_file:
      - IPAddress
      - URL
      db_select:
      - Password
      - PhoneNumber
      http_get:
      - IPAddress
      http_post:
      - IPAddress
      - Email
  melon:
    enabled: true
    threshold: 0.8
    embedding_model: text-embedding-3-large
    raise_on_injection: true
